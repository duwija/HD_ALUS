name: attendance_app
description: Aplikasi Absensi Karyawan

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Auth storage
  flutter_secure_storage: ^9.0.0

  # GPS
  geolocator: ^11.0.0

  # Kamera / selfie
  image_picker: ^1.1.0

  # Shared prefs (non-sensitive cache)
  shared_preferences: ^2.2.0

  # Tanggal
  intl: ^0.19.0

  # Kalender
  table_calendar: ^3.1.1

  # Loading overlay
  flutter_spinkit: ^5.2.1

  # WebView (untuk halaman tiket)
  webview_flutter: ^4.8.0

  # Icon pack tambahan
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

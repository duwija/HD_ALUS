name: attendance_app
description: Aplikasi  Karyawan

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Auth storage
  flutter_secure_storage: ^10.0.0

  # GPS
  geolocator: ^14.0.2

  # Kamera / selfie
  image_picker: ^1.1.0

  # Shared prefs (non-sensitive cache)
  shared_preferences: ^2.2.0

  # Tanggal
  intl: ^0.20.2

  # Kalender
  table_calendar: ^3.1.1

  # Loading overlay
  flutter_spinkit: ^5.2.1

  # WebView (untuk halaman tiket)
  webview_flutter: ^4.8.0

  # Buka URL di browser eksternal
  url_launcher: ^6.3.0

  # Firebase & Push Notification
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Deteksi fake GPS / root / emulator
  safe_device: ^1.1.9

  # Icon pack tambahan
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"   # min 1024x1024 px
  adaptive_icon_background: "#FFFFFF"       # warna background Android adaptive
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    
